<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Content Security Policy: Permite scripts/estilos inline para o motor de animação -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self';">
  <title>PETSKOD</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: no-drag;
      font-family: 'Nunito', 'Segoe UI', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      cursor: grab;
    }
    #app:active { cursor: grabbing; }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Botão fechar ── */
    #btn-close {
      position: absolute;
      top: 7px;
      right: 7px;
      width: 24px;
      height: 24px;
      background: #FF5E5E;
      border: 3px solid #000;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.25s, transform 0.15s, background 0.2s;
      font-size: 12px;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      line-height: 1;
      font-weight: 900;
      box-shadow: 2px 2px 0px #000;
    }
    #app:hover #btn-close { opacity: 1; }
    #btn-close:hover { transform: scale(1.1); background: #FF2E2E; box-shadow: 3px 3px 0px #000; }
    #btn-close:active { transform: scale(0.9); box-shadow: 1px 1px 0px #000; }

    /* ── Balão de fala ── */
    .menu-header {
      padding: 8px 10px 4px 10px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #000;
      font-weight: 900;
      opacity: 0.6;
    }
    
    #context-menu::-webkit-scrollbar { width: 4px; }
    #context-menu::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 2px; }

    #speech-bubble {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 32px;
      background: rgba(255, 255, 255, 0.92);
      color: #333;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 12px;
      border-bottom-left-radius: 3px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      z-index: 15;
      opacity: 0;
      transform: translateY(-6px) scale(0.92);
      transition: opacity 0.3s cubic-bezier(.34,1.56,.64,1), transform 0.3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      max-lines: 2;
      word-break: break-word;
      backdrop-filter: blur(6px);
    }
    #speech-bubble.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* Rabo do balão */
    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 14px;
      border: 6px solid transparent;
      border-top-color: rgba(255,255,255,0.92);
      border-bottom: none;
    }

    /* ── Status label ── */
    #status-label {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.35);
      padding: 3px 10px;
      border-radius: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      white-space: nowrap;
      z-index: 10;
      backdrop-filter: blur(4px);
    }
    #status-label.visible { opacity: 1; }

    /* ── Custom Context Menu ── */
    #context-menu {
      position: absolute;
      width: 150px;
      background: #FFF; /* Fundo sólido cartoon */
      border: 4px solid #000;
      border-radius: 16px;
      padding: 8px;
      box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.2);
      z-index: 100;
      display: none;
      flex-direction: column;
      gap: 4px;
      transform-origin: top left;
      animation: cartoonPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow-y: auto;
      max-height: 420px;
      scrollbar-width: none;
    }

    #context-menu::before {
      content: '';
      position: absolute;
      inset: -4px;
      border: 4px solid #FFD700; /* Borda colorida animada */
      border-radius: 16px;
      z-index: -1;
      animation: borderPulse 2s infinite alternate ease-in-out;
      pointer-events: none;
    }

    @keyframes borderPulse {
      0% { transform: scale(1); opacity: 0.5; border-color: #FFD700; }
      100% { transform: scale(1.03); opacity: 1; border-color: #FF5E5E; }
    }

    @keyframes cartoonPop {
      from { opacity: 0; transform: scale(0.5) rotate(-5deg); }
      to { opacity: 1; transform: scale(1) rotate(0); }
    }

    .menu-item {
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      color: #000;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 2px solid transparent;
    }

    .menu-item:hover {
      background: #F0F0F0;
      border-color: #000;
      transform: scale(1.05) translateX(5px);
      box-shadow: 3px 3px 0px #000;
    }

    .menu-item:active { transform: scale(0.95); box-shadow: 1px 1px 0px #000; }

    .menu-separator {
      height: 3px;
      background: #000;
      border-radius: 2px;
      margin: 4px 6px;
      opacity: 0.1;
    }
  </style>
</head>
<body>
  <div id="app">
    <button id="btn-close" title="Fechar PETSKOD">✕</button>
    <div id="speech-bubble"><span id="speech-text">...</span></div>
    <div id="status-label">Carregando...</div>

    <div id="context-menu">
      <!-- Visão Principal -->
      <div id="menu-main" style="display: flex; flex-direction: column; gap: 4px; width: 100%;">
        <div class="menu-header">✨ AÇÕES</div>
        <div class="menu-item" data-action="feed">🍕 Alimentar</div>
        <div class="menu-item" data-action="play">🧶 Brincar</div>
        <div class="menu-item" data-action="pet">✋ Acariciar</div>
        
        <div class="menu-separator"></div>
        <div class="menu-header">🕺 DANÇA & EXERCÍCIO</div>
        <div class="menu-item" data-action="dance-flair">🔥 Dança Flair!</div>
        <div class="menu-item" data-action="dance-random">💃 Dançar</div>
        <div class="menu-item" data-action="exercise">💪 Exercitar</div>
        
        <div class="menu-separator"></div>
        <div class="menu-header">👤 PERSONAGEM</div>
        <div id="character-list">
          <!-- Inserido via JS -->
        </div>
        
        <div class="menu-separator"></div>
        <div class="menu-item" data-action="toggle-sleep">😴 Dormir / Acordar</div>
        <div class="menu-item" data-action="view-settings">⚙️ Configurações</div>
        <div class="menu-separator"></div>
        <div class="menu-item" action-quit="true" style="color: #ff6b6b">❌ Sair</div>
      </div>

      <!-- Visão de Configurações (Submenu) -->
      <div id="menu-settings" style="display: none; flex-direction: column; gap: 4px; width: 100%;">
        <div class="menu-header">⚙️ CONFIGURAÇÕES</div>
        <div class="menu-item" data-action="view-main">⬅️ Voltar</div>
        
        <div class="menu-separator"></div>
        <div class="menu-header">🔊 VELOCIDADE DA VOZ</div>
        <div class="menu-item" data-action="voice-rate--2">🐢 Lenta</div>
        <div class="menu-item" data-action="voice-rate-0">🚶 Normal</div>
        <div class="menu-item" data-action="voice-rate-3">⚡ Rápida</div>
        
        <div class="menu-separator"></div>
        <div class="menu-header">🎼 TOM DA VOZ</div>
        <div class="menu-item" data-action="voice-pitch-low">📉 Grave</div>
        <div class="menu-item" data-action="voice-pitch-medium">↔️ Normal</div>
        <div class="menu-item" data-action="voice-pitch-high">📈 Agudo</div>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "./node_modules/three/build/three.module.js",
        "three/addons/": "./node_modules/three/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="./src/app/renderer.js"></script>
</body>
</html>
