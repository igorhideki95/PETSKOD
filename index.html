<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PETSKOD</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 250px;
      height: 350px;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: no-drag;
      font-family: 'Nunito', 'Segoe UI', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      cursor: grab;
    }
    #app:active { cursor: grabbing; }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Botão fechar ── */
    #btn-close {
      position: absolute;
      top: 7px;
      right: 7px;
      width: 20px;
      height: 20px;
      background: rgba(255, 80, 80, 0.9);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.25s, transform 0.15s;
      font-size: 10px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      line-height: 1;
      font-weight: 700;
    }
    #app:hover #btn-close { opacity: 1; }
    #btn-close:hover { transform: scale(1.15); background: rgba(255, 40, 40, 1); }

    /* ── Balão de fala ── */
    #speech-bubble {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 32px;
      background: rgba(255, 255, 255, 0.92);
      color: #333;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 12px;
      border-bottom-left-radius: 3px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      z-index: 15;
      opacity: 0;
      transform: translateY(-6px) scale(0.92);
      transition: opacity 0.3s cubic-bezier(.34,1.56,.64,1), transform 0.3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      max-lines: 2;
      word-break: break-word;
      backdrop-filter: blur(6px);
    }
    #speech-bubble.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* Rabo do balão */
    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 14px;
      border: 6px solid transparent;
      border-top-color: rgba(255,255,255,0.92);
      border-bottom: none;
    }

    /* ── Status label ── */
    #status-label {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.35);
      padding: 3px 10px;
      border-radius: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      white-space: nowrap;
      z-index: 10;
      backdrop-filter: blur(4px);
    }
    #status-label.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="app">
    <button id="btn-close" title="Fechar PETSKOD">✕</button>
    <div id="speech-bubble"><span id="speech-text">...</span></div>
    <div id="status-label">Carregando...</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "./node_modules/three/build/three.module.js",
        "three/addons/": "./node_modules/three/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="./src/app/renderer.js"></script>
</body>
</html>
